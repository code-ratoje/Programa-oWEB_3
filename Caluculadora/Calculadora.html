<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <link rel="stylesheet" href="Calculadora.css">
</head>
<body>
    <div id="InputNumbers" class="containerA">
        <h2>CALCULADORA</h2><br>
        <form id="Row"> 
            <div class="containerB">
                <label>1º valor (a)</label>
                <input id="a" type="text" placeholder="valor A">
            </div>
            <div class="containerB">
                <label>2º valor (b)</label>
                <input id="b" type="text" placeholder="valor B">
            </div>
            <div class="containerB">
                <label>3º valor (c)</label>
                <input id="c" type="text" placeholder="valor C">
            </div>
            <div class="containerB">
                <label>4º valor (d)</label>
                <input id="d" type="text" placeholder="valor D">
            </div>
        </form>
    </div>

    <div class="containerA">
        <form>
            <label>Dobro:</label>
            <input id="resDobro" type="text" readonly>

            <label>Triplo:</label>
            <input id="resTriplo" type="text" readonly>
            
            <label>Quádruplo</label>
            <input id="resQuadruplo" type="text" readonly>

            <label>Quíntuplo:</label>
            <input id="resQuintuplo" type="text" readonly>

            <label>Sêxtuplo:</label>
            <input id="resSextuplo" type="text" readonly>

            <label>Quadrado</label>
            <input id="resQuadrado" type="text" readonly>

            <label>Cubo</label>
            <input id="resCubo" type="text" readonly> 

            <label>Quarta Potência</label>
            <input id="resQuarta" type="text" readonly> 

            <label>Quinta Potência</label>
            <input id="resQuinta" type="text" readonly> 

            <label>Sexta Potência</label>
            <input id="resSexta" type="text" readonly> 

            <label>Bhaskara (n1, n2, n3)</label>
            <input id="resBhaskara" type="text" readonly> 

            <label>Média aritmética</label>
            <input id="resMedia" type="text" readonly> 

            <label>Par ou Ímpar (n1)</label>
            <input id="resParImpar" type="text" readonly> 

            <hr>
            <div class="botoes">
                <input type="button" value="Calcular" onclick="Calcular()">
                <input type="reset" value="Limpar">
            </div>
        </form>
    </div>
    <script src="Calculadora.js"></script>
</body>
</html>
